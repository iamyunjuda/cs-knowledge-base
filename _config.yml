title: CS Knowledge Base
description: 헷갈리기 쉬운 CS 지식들을 주제별로 정리하는 블로그
url: "https://iamyunjuda.github.io"
baseurl: "/cs-knowledge-base"

# 테마 (Gemfile에서 직접 설치)
theme: just-the-docs

# 마크다운
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# 플러그인
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# jekyll-feed 설정
feed:
  path: atom.xml

# just-the-docs 설정
color_scheme: light
search_enabled: true
search:
  heading_level: 3
heading_anchors: true
footer_content: "CS Knowledge Base &mdash; 헷갈리기 쉬운 CS 지식 정리"

# Google Analytics (GA4 측정 ID, 예: G-XXXXXXXXXX)
# google_analytics: G-XXXXXXXXXX

# 검색엔진 인증 (Search Console / Naver에서 발급받은 코드 입력)
# google_site_verification: "여기에_구글_인증코드"
# naver_site_verification: "여기에_네이버_인증코드"

# 빌드에서 제외
exclude:
  - CLAUDE.md
  - .env
  - .env.example
  - output/
  - scripts/
  - __pycache__/
