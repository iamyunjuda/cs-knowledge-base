title: CS Knowledge Base
description: 헷갈리기 쉬운 CS 지식들을 주제별로 정리하는 블로그
url: ""
baseurl: "/cs-knowledge-base"

# 테마
remote_theme: just-the-docs/just-the-docs@v0.10.1

# 마크다운
url: "" # GitHub Pages 배포 후 실제 URL로 변경 (예: https://username.github.io)
baseurl: "/cs-knowledge-base" # repo 이름

# 테마
remote_theme: pages-themes/cayman@v0.2.0

# 마크다운 설정
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# 플러그인
# SEO
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

# just-the-docs 설정
color_scheme: light

# 검색 활성화
search_enabled: true
search:
  heading_level: 3

# 페이지 우측 목차 (Table of Contents)
heading_anchors: true

# 푸터
footer_content: "CS Knowledge Base &mdash; 헷갈리기 쉬운 CS 지식 정리"
# front matter 없는 .md도 처리
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: "*.md"
    values:
      layout: "default"
  - scope:
      path: "java-jvm"
    values:
      layout: "default"
  - scope:
      path: "network"
    values:
      layout: "default"
  - scope:
      path: "spring"
    values:
      layout: "default"
  - scope:
      path: "os"
    values:
      layout: "default"
  - scope:
      path: "database"
    values:
      layout: "default"
  - scope:
      path: "data-structure"
    values:
      layout: "default"
  - scope:
      path: "design-pattern"
    values:
      layout: "default"

# 빌드에서 제외
exclude:
  - CLAUDE.md
  - .env
  - .env.example
  - output/
  - scripts/
  - __pycache__/
