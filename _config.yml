title: CS Knowledge Base
description: 헷갈리기 쉬운 CS 지식들을 주제별로 정리하는 블로그 — Java, Spring, Network, OS, Database, Kafka, Redis, Blockchain, 디자인 패턴, Git 등 백엔드 개발자를 위한 CS 면접 대비 지식 저장소
url: "https://iamyunjuda.github.io"
baseurl: "/cs-knowledge-base"
lang: ko
locale: ko_KR
author: iamyunjuda

# 테마 (Gemfile에서 직접 설치)
theme: just-the-docs

# 마크다운
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# 플러그인
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# jekyll-feed 설정
feed:
  path: atom.xml

# just-the-docs 설정
color_scheme: light
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: true
heading_anchors: true
footer_content: "CS Knowledge Base &mdash; 헷갈리기 쉬운 CS 지식 정리"

# Google Analytics (GA4 측정 ID)
google_analytics: G-LYZFLNQ436

# 검색엔진 인증 (Search Console / Naver에서 발급받은 코드 입력)
google_site_verification: "kvim__rgjS6ZM55mXN2Gq_ONBLrGNed1Cvz_Al_qeoI"
# naver_site_verification: "여기에_네이버_인증코드"

# 모든 페이지에 기본 레이아웃 적용
defaults:
  - scope:
      path: ""
    values:
      layout: default

# 빌드에서 제외
exclude:
  - CLAUDE.md
  - .env
  - .env.example
  - output/
  - scripts/
  - __pycache__/
