title: CS Knowledge Base
description: 헷갈리기 쉬운 CS 지식들을 주제별로 정리하는 블로그
url: ""
baseurl: "/cs-knowledge-base"

# 테마
remote_theme: just-the-docs/just-the-docs@v0.10.2

# 마크다운
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# 플러그인
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

# just-the-docs 설정
color_scheme: light

# 검색 활성화
search_enabled: true
search:
  heading_level: 3

# 페이지 우측 목차 (Table of Contents)
heading_anchors: true

# 푸터
footer_content: "CS Knowledge Base &mdash; 헷갈리기 쉬운 CS 지식 정리"

# 빌드에서 제외
exclude:
  - CLAUDE.md
  - .env
  - .env.example
  - output/
  - scripts/
  - __pycache__/
