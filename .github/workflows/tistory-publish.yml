name: Tistory 자동 포스팅

on:
  push:
    branches: [main]
    paths:
      - 'java-jvm/**'
      - 'spring/**'
      - 'network/**'
      - 'os/**'
      - 'database/**'
      - 'data-structure/**'
      - 'design-pattern/**'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 변경된 파일 감지용

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 변경된 마크다운 파일 감지
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- '*.md' | grep -v README.md | grep -v CLAUDE.md || true)
          if [ -z "$FILES" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "변경된 마크다운 파일 없음"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "$FILES" > changed_files.txt
            echo "변경된 파일:"
            cat changed_files.txt
          fi

      - name: Tistory에 게시
        if: steps.changed.outputs.skip == 'false'
        env:
          TISTORY_ACCESS_TOKEN: ${{ secrets.TISTORY_ACCESS_TOKEN }}
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
        run: |
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "게시 중: $file"
              python scripts/tistory-convert.py --publish "$file"
            fi
          done < changed_files.txt
