name: GitHub Pages 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: 빌드 결과 확인
        run: |
          echo "=== _site 파일 목록 ==="
          find _site -type f | head -30
          echo "=== index.html 미리보기 ==="
          head -30 _site/index.html 2>/dev/null || echo "ERROR: index.html 없음!"

      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
