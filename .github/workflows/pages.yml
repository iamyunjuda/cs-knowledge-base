name: GitHub Pages 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Jekyll 빌드
        run: |
          gem install jekyll bundler jekyll-remote-theme jekyll-seo-tag jekyll-sitemap
          jekyll build --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: 빌드 결과 확인
        run: |
          echo "=== _site 내용 ==="
          ls -la _site/
          echo "=== index.html 존재 여부 ==="
          head -20 _site/index.html || echo "index.html 없음!"

      - uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
