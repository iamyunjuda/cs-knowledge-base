<!-- Google Analytics (GA4) — GA_TRACKING_ID를 본인 측정 ID로 교체하세요 -->
{% if site.google_analytics %}
<!-- Global site tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics }}');
</script>
{% endif %}

<!-- Google Search Console 인증 -->
{% if site.google_site_verification %}
<meta name="google-site-verification" content="{{ site.google_site_verification }}" />
{% endif %}

<!-- Naver Search Advisor 인증 -->
{% if site.naver_site_verification %}
<meta name="naver-site-verification" content="{{ site.naver_site_verification }}" />
{% endif %}

<!-- RSS Feed -->
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.url }}{{ site.baseurl }}/feed.xml" />
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ site.url }}{{ site.baseurl }}/atom.xml" />

<!-- Open Graph 보강 -->
<meta property="og:locale" content="ko_KR" />
<meta property="og:site_name" content="{{ site.title }}" />
{% if page.title %}
<meta property="og:type" content="article" />
{% else %}
<meta property="og:type" content="website" />
{% endif %}

<!-- Canonical URL -->
<link rel="canonical" href="{{ site.url }}{{ site.baseurl }}{{ page.url | replace: 'index.html', '' }}" />

<!-- JSON-LD 구조화 데이터 -->
{% if page.title and page.parent %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | default: page.content | strip_html | truncatewords: 40 | jsonify }},
  "url": "{{ site.url }}{{ site.baseurl }}{{ page.url }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.author | default: 'iamyunjuda' }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.title }}"
  },
  "inLanguage": "ko",
  "keywords": {% if page.tags %}{{ page.tags | jsonify }}{% else %}[]{% endif %}
}
</script>
{% endif %}
